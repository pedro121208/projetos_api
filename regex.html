<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de RegEx</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .simulador-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .regex-display { font-family: monospace; background: #212529; color: #00ff00; padding: 10px; border-radius: 5px; font-size: 1.2rem; text-align: center; letter-spacing: 2px;}
    </style>
</head>
<body>

    <div class="simulador-card">
        <h2 class="text-center mb-4">🔍 Simulador de RegEx</h2>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Escolha o formato:</label>
            <select id="tipoFiltro" class="form-select form-select-lg">
                <option value="cep">CEP</option>
                <option value="cpf">CPF</option>
                <option value="celular">Telefone Celular</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">A Regra (RegEx):</label>
            <div id="displayRegEx" class="regex-display">/^\d{5}-?\d{3}$/</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Teste aqui:</label>
            <input type="text" id="campoTeste" class="form-control form-control-lg" placeholder="Digite para testar...">
        </div>

        <div id="resultado" class="alert alert-secondary text-center fs-5" role="alert">
            Aguardando digitação...
        </div>
    </div>

    <script>
        // Dicionário com as nossas regras
        const regrasRegEx = {
            cep: {
                padrao: /^\\d{5}-?\\d{3}$/,
                texto: "/^\\d{5}-?\\d{3}$/"
            },
            cpf: {
                padrao: /^\\d{3}\\.?\\d{3}\\.?\\d{3}-?\\d{2}$/,
                texto: "/^\\d{3}\\.?\\d{3}\\.?\\d{3}-?\\d{2}$/"
            },
            celular: {
                padrao: /^\\(?\\d{2}\\)?\\s?\\d{5}-?\\d{4}$/,
                texto: "/^\\(?\\d{2}\\)?\\s?\\d{5}-?\\d{4}$/"
            }
        };

        const selectTipo = document.getElementById('tipoFiltro');
        const displayRegEx = document.getElementById('displayRegEx');
        const campoTeste = document.getElementById('campoTeste');
        const resultado = document.getElementById('resultado');

        // Atualiza a regra visual na tela quando muda o select
        selectTipo.addEventListener('change', (e) => {
            const tipo = e.target.value;
            displayRegEx.innerText = regrasRegEx[tipo].texto;
            campoTeste.value = ''; // Limpa o campo
            resetarVisual();
        });

        // Testa o que o usuário digita em tempo real
        campoTeste.addEventListener('input', (e) => {
            const textoDigitado = e.target.value;
            const tipo = selectTipo.value;
            const regraAtual = regrasRegEx[tipo].padrao;

            if (textoDigitado === '') {
                resetarVisual();
                return;
            }

            // A Mágica acontece aqui: o método .test() retorna true ou false
            if (regraAtual.test(textoDigitado)) {
                resultado.className = 'alert alert-success text-center fs-5 fw-bold';
                resultado.innerHTML = '✅ Formato Válido!';
                campoTeste.classList.remove('is-invalid');
                campoTeste.classList.add('is-valid');
            } else {
                resultado.className = 'alert alert-danger text-center fs-5 fw-bold';
                resultado.innerHTML = '❌ Formato Inválido!';
                campoTeste.classList.remove('is-valid');
                campoTeste.classList.add('is-invalid');
            }
        });

        function resetarVisual() {
            resultado.className = 'alert alert-secondary text-center fs-5';
            resultado.innerHTML = 'Aguardando digitação...';
            campoTeste.classList.remove('is-valid', 'is-invalid');
        }
    </script>
</body>
</html>
